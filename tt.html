<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Amplify Deployment</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            border-radius: 10px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        h1 { color: #ff9900; } /* AWS Orange */
        p { font-size: 1.2rem; color: #b3b3b3; }
        .version {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff9900;
            color: #121212;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from AWS Amplify!</h1>
        <p>This static website is deployed via a CI/CD pipeline.</p>
        <div class="version">Version 1.0</div>
    </div>
</body>
</html>
